name: Deploy to Cloudflare Pages and AI Post Generator

on:
  push:
    branches:
      - main
  schedule:
    # 가장 트래픽이 적은 시간인 매일 새벽 4시 27분(UTC 19시 27분)에 실행
    - cron: '27 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Install Dependencies
        run: npm ci

      - name: 4. Generate Blog Post (Only on schedule or manual run)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/generate-blog-post.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 5. Build Project
        run: npm run build

      - name: 6. Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=cholinus-exerciseismedicine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 7. Commit and Push Generated Post (Only on schedule or manual run)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            # [skip ci] 키워드로 깃허브 액션 중복 호출을 영리하게 방지합니다.
            git commit -m "chore: 🤖 AI 자동 재활 포스트 생성 발행 [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
