name: 매일 아침 AI 자동 포스팅 스케줄러

on:
  schedule:
    # 매일 새벽 4시 27분(UTC 19시 27분)에 실행
    - cron: '27 19 * * *'
  workflow_dispatch: # 수동으로도 즉시 실행할 수 있게 설정

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      # Git 커밋 및 푸시 권한 획득
      contents: write

    steps:
      - name: 1. 코드 저장소 가져오기
        uses: actions/checkout@v4

      - name: 2. Node.js 개발 환경 구성
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. 필요한 라이브러리 설치
        run: npm ci || npm install

      - name: 4. Gemini AI 블로그 자동 생성 스크립트 구동
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog-post.js

      - name: 5. 새로 생성된 포스트 파일을 저장소에 저장 (Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항 확인
          git add .
          
          # 커밋할 내용이 있는 경우에만 커밋 진행 (오류 방지)
          if git diff --cached --quiet; then
            echo "새로 생성된 글이 없거나 변경 사항이 없습니다."
          else
            git commit -m "chore: 🤖 AI 자동 재활 포스트 생성 발행"
            git push origin HEAD:${{ github.ref }}
            echo "성공적으로 새 글을 커밋하고 푸시했습니다!"
          fi
